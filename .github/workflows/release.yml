# Create a GitHub Release when a version tag (v*.*.*) is pushed.
# npm publishing is done manually — see RELEASE_PROCESS.md.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  markitdown-assets:
    name: Build MarkItDown binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: markitdown-linux-x64
          - runner: macos-14
            asset_name: markitdown-darwin-arm64
          - runner: windows-latest
            asset_name: markitdown-win32-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build current-platform MarkItDown binary
        run: node packages/cli/scripts/bundle-markitdown-binaries.mjs --build-current-platform --force

      - name: Upload MarkItDown binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-${{ matrix.asset_name }}
          path: |
            packages/cli/bin/${{ matrix.asset_name }}
            packages/cli/bin/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  release:
    name: Build, test, and create release
    needs: markitdown-assets
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match semver format v*.*.*"
            exit 1
          fi

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Detect pre-release
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: pnpm setup
        uses: pnpm/action-setup@v4

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm turbo test --filter='!@origintrail-official/dkg-evm-module'

      - name: Download MarkItDown release assets
        uses: actions/download-artifact@v4
        with:
          pattern: markitdown-*
          merge-multiple: true
          path: release-assets

      - name: Extract release notes
        id: notes
        run: |
          V="${{ steps.version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## \[$V\]/,/^## \[/p" CHANGELOG.md | sed '/^## \[/d' | sed '1d' > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "## DKG V9 Node $V" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v$V/CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
